<!DOCTYPE html>
<html lang="en">
<head><title>comprs browser test</title></head>
<body>
<pre id="log"></pre>
<script type="module">
  const log = (msg) => { document.getElementById('log').textContent += `${msg}\n`; };

  try {
    log('Loading WASM module...');
    const wasm = await import('../comprs-wasm.js');
    log(`Loaded. Exports: ${Object.keys(wasm).length}`);

    const results = {};
    const testData = new TextEncoder().encode('Hello, browser WASM comprs! '.repeat(100));

    // zstd round-trip
    const zstdCompressed = wasm.zstdCompress(testData);
    const zstdDecompressed = wasm.zstdDecompress(zstdCompressed);
    results.zstdRoundTrip = arrayEqual(zstdDecompressed, testData);
    log(`zstd round-trip: ${results.zstdRoundTrip}`);

    // gzip round-trip
    const gzipCompressed = wasm.gzipCompress(testData);
    const gzipDecompressed = wasm.gzipDecompress(gzipCompressed);
    results.gzipRoundTrip = arrayEqual(gzipDecompressed, testData);
    log(`gzip round-trip: ${results.gzipRoundTrip}`);

    // deflate round-trip
    const deflateCompressed = wasm.deflateCompress(testData);
    const deflateDecompressed = wasm.deflateDecompress(deflateCompressed);
    results.deflateRoundTrip = arrayEqual(deflateDecompressed, testData);
    log(`deflate round-trip: ${results.deflateRoundTrip}`);

    // brotli round-trip
    const brotliCompressed = wasm.brotliCompress(testData);
    const brotliDecompressed = wasm.brotliDecompress(brotliCompressed);
    results.brotliRoundTrip = arrayEqual(brotliDecompressed, testData);
    log(`brotli round-trip: ${results.brotliRoundTrip}`);

    // auto-detect decompression
    const autoDecompressed = wasm.decompress(zstdCompressed);
    results.autoDetect = arrayEqual(autoDecompressed, testData);
    log(`auto-detect: ${results.autoDetect}`);

    // version
    results.version = wasm.version();
    log(`version: ${results.version}`);

    // streaming compression via one-shot adapter (avoids WASM memory growth issue)
    // This tests the same pattern as browser-streaming.js but inline to avoid
    // import resolution issues with the comprs-wasm32-wasi package in e2e.
    try {
      const chunks = [];
      chunks.push(new Uint8Array(testData.slice(0, 100)));
      chunks.push(new Uint8Array(testData.slice(100)));
      const total = chunks.reduce((sum, c) => sum + c.byteLength, 0);
      const combined = new Uint8Array(total);
      let off = 0;
      for (const c of chunks) { combined.set(c, off); off += c.byteLength; }
      const compressed = wasm.gzipCompress(combined);
      const decompressed = wasm.gzipDecompress(compressed);
      results.streaming = arrayEqual(decompressed, testData);
      log(`streaming adapter: ${results.streaming}`);
    } catch (e) {
      log(`streaming adapter error: ${e.message}`);
      results.streaming = false;
      results.streamingError = e.message;
    }

    // streaming decompression via one-shot adapter
    try {
      const decompressed = wasm.gzipDecompress(gzipCompressed);
      results.streamingDecompress = arrayEqual(decompressed, testData);
      log(`streaming decompress adapter: ${results.streamingDecompress}`);
    } catch (e) {
      log(`streaming decompress adapter error: ${e.message}`);
      results.streamingDecompress = false;
      results.streamingDecompressError = e.message;
    }

    window.__results = results;
    window.__ready = true;
    log('All tests completed.');
  } catch (e) {
    log(`FATAL: ${e.message}\n${e.stack}`);
    window.__error = e.message;
    window.__ready = true;
  }

  function arrayEqual(a, b) {
    if (a.length !== b.length) return false;
    for (let i = 0; i < a.length; i++) {
      if (a[i] !== b[i]) return false;
    }
    return true;
  }

</script>
</body>
</html>
