<!DOCTYPE html>
<html lang="en">
<head><title>comprs browser test</title></head>
<body>
<pre id="log"></pre>
<script type="module">
  const log = (msg) => { document.getElementById('log').textContent += `${msg}\n`; };

  try {
    // Vite 8 does not support the TC39 WebAssembly ESM integration proposal,
    // so we cannot import comprs-wasm.js directly (it contains
    // `import * as wasm from './file.wasm'` which Vite rejects).
    //
    // Instead, import the background bindings and instantiate WASM manually.
    const [mod, { default: wasmUrl }] = await Promise.all([
      import('../comprs-wasm_bg.js'),
      import('../comprs-wasm_bg.wasm?url'),
    ]);

    const bytes = await fetch(wasmUrl).then(r => r.arrayBuffer());
    const { instance } = await WebAssembly.instantiate(bytes, {
      './comprs-wasm_bg.js': mod,
    });
    mod.__wbg_set_wasm(instance.exports);

    log('WASM module loaded.');

    const results = {};
    const testData = new TextEncoder().encode('Hello, browser WASM comprs! '.repeat(100));

    // zstd round-trip
    const zstdCompressed = mod.zstdCompress(testData);
    const zstdDecompressed = mod.zstdDecompress(zstdCompressed);
    results.zstdRoundTrip = arrayEqual(zstdDecompressed, testData);
    log(`zstd round-trip: ${results.zstdRoundTrip}`);

    // gzip round-trip
    const gzipCompressed = mod.gzipCompress(testData);
    const gzipDecompressed = mod.gzipDecompress(gzipCompressed);
    results.gzipRoundTrip = arrayEqual(gzipDecompressed, testData);
    log(`gzip round-trip: ${results.gzipRoundTrip}`);

    // deflate round-trip
    const deflateCompressed = mod.deflateCompress(testData);
    const deflateDecompressed = mod.deflateDecompress(deflateCompressed);
    results.deflateRoundTrip = arrayEqual(deflateDecompressed, testData);
    log(`deflate round-trip: ${results.deflateRoundTrip}`);

    // brotli round-trip
    const brotliCompressed = mod.brotliCompress(testData);
    const brotliDecompressed = mod.brotliDecompress(brotliCompressed);
    results.brotliRoundTrip = arrayEqual(brotliDecompressed, testData);
    log(`brotli round-trip: ${results.brotliRoundTrip}`);

    // lz4 round-trip
    const lz4Compressed = mod.lz4Compress(testData);
    const lz4Decompressed = mod.lz4Decompress(lz4Compressed);
    results.lz4RoundTrip = arrayEqual(lz4Decompressed, testData);
    log(`lz4 round-trip: ${results.lz4RoundTrip}`);

    // auto-detect decompression
    const autoDecompressed = mod.decompress(zstdCompressed);
    results.autoDetect = arrayEqual(autoDecompressed, testData);
    log(`auto-detect: ${results.autoDetect}`);

    // version
    results.version = mod.version();
    log(`version: ${results.version}`);

    // crc32
    results.crc32 = mod.crc32(testData);
    log(`crc32: ${results.crc32}`);

    // detect format
    results.detectFormat = mod.detectFormat(zstdCompressed);
    log(`detect format: ${results.detectFormat}`);

    window.__results = results;
    window.__ready = true;
    log('All tests completed.');
  } catch (e) {
    log(`FATAL: ${e.message}\n${e.stack}`);
    window.__error = e.message;
    window.__ready = true;
  }

  function arrayEqual(a, b) {
    if (a.length !== b.length) return false;
    for (let i = 0; i < a.length; i++) {
      if (a[i] !== b[i]) return false;
    }
    return true;
  }

</script>
</body>
</html>
