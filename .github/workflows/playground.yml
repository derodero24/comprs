name: Deploy Playground

on:
  push:
    branches: [develop]
    paths:
      - 'playground/**'
      - '.github/workflows/playground.yml'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'browser-entry.js'
      - 'browser-streaming.js'
      - 'browser.js'
      - 'scripts/build-wasm-bindgen.js'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy playground
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: playground-wasm-bindgen

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build wasm-bindgen WASM
        run: pnpm run build:wasm-bindgen

      - name: Install playground dependencies
        run: cd playground && pnpm install

      - name: Build playground
        run: cd playground && pnpm build
        env:
          GITHUB_ACTIONS: true

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v4
        with:
          path: playground/dist

      - uses: actions/deploy-pages@v5
        id: deployment
