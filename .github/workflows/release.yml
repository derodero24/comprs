name: Release

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  # ──── On develop push: manage version PR and create release PR ────
  version:
    name: Version
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    env:
      LEFTHOOK: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-version
      - run: pnpm install --frozen-lockfile

      - name: Create version PR or detect release
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          version: pnpm run changeset:version
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update release PR
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          CORE_NAME=$(node -p "require('./package.json').name")
          CORE_VERSION=$(node -p "require('./package.json').version")
          MW_NAME=$(node -p "require('./packages/middleware/package.json').name")
          MW_VERSION=$(node -p "require('./packages/middleware/package.json').version")

          # Check publish status (distinguish E404 "not found" from other errors)
          check_published() {
            local pkg="$1" ver="$2"
            local err
            if err=$(npm view "${pkg}@${ver}" version 2>&1); then
              echo "published"
            elif echo "$err" | grep -q "E404"; then
              echo "unpublished"
            else
              echo "Error checking ${pkg}@${ver}: $err" >&2
              exit 1
            fi
          }

          CORE_STATUS=$(check_published "$CORE_NAME" "$CORE_VERSION")
          MW_STATUS=$(check_published "$MW_NAME" "$MW_VERSION")

          if [ "$CORE_STATUS" = "published" ] && [ "$MW_STATUS" = "published" ]; then
            echo "All packages already published, skipping release PR"
            exit 0
          fi

          echo "Core: ${CORE_NAME}@${CORE_VERSION} → ${CORE_STATUS}"
          echo "Middleware: ${MW_NAME}@${MW_VERSION} → ${MW_STATUS}"

          EXISTING=$(gh pr list --base main --head develop --json number --jq '.[0].number')
          CORE_BADGE=$([ "$CORE_STATUS" = "published" ] && echo "published" || echo "**new**")
          MW_BADGE=$([ "$MW_STATUS" = "published" ] && echo "published" || echo "**new**")
          BODY=$(printf '## Release\n\n| Package | Version | Status |\n|---------|---------|--------|\n| %s | %s | %s |\n| %s | %s | %s |\n\nMerging this PR will build and publish unpublished packages to npm with provenance.' \
            "$CORE_NAME" "$CORE_VERSION" "$CORE_BADGE" \
            "$MW_NAME" "$MW_VERSION" "$MW_BADGE")

          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --title "chore(release): release packages" --body "$BODY"
            echo "Updated existing release PR #${EXISTING}"
          else
            gh pr create --base main --head develop \
              --title "chore(release): release packages" \
              --body "$BODY"
            echo "Created release PR"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──── On main push: check if publish is needed ────
  check:
    name: Check Version
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc

      - name: Check if version is already published
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@derodero24/comprs@${VERSION}" version 2>/dev/null; then
            echo "Version ${VERSION} already published, skipping"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "Version ${VERSION} not yet published, proceeding"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

  # ──── Build native binaries for all platforms ────
  build:
    name: Build - ${{ matrix.settings.target }}
    needs: check
    if: needs.check.outputs.should_publish == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: true
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use-zig: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use-zig: true
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
          - host: ubuntu-latest
            target: wasm32-wasip1-threads
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-${{ matrix.settings.target }}

      - run: pnpm install --frozen-lockfile

      - name: Install cargo-zigbuild
        if: ${{ matrix.settings.use-zig }}
        run: pip3 install ziglang && cargo install cargo-zigbuild

      - name: Setup WASI SDK
        if: matrix.settings.target == 'wasm32-wasip1-threads'
        run: |
          WASI_SDK_VERSION="25"
          WASI_SDK_DIR="wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux"
          curl -fsSL "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/${WASI_SDK_DIR}.tar.gz" | tar xz -C "${RUNNER_TEMP}"
          echo "WASI_SDK_PATH=${RUNNER_TEMP}/${WASI_SDK_DIR}" >> $GITHUB_ENV
          echo "WASI_SYSROOT=${RUNNER_TEMP}/${WASI_SDK_DIR}/share/wasi-sysroot" >> $GITHUB_ENV
          echo "CC_wasm32_wasip1_threads=${RUNNER_TEMP}/${WASI_SDK_DIR}/bin/clang" >> $GITHUB_ENV
          echo "AR_wasm32_wasip1_threads=${RUNNER_TEMP}/${WASI_SDK_DIR}/bin/llvm-ar" >> $GITHUB_ENV

      - name: Build native
        if: matrix.settings.target != 'wasm32-wasip1-threads'
        run: >-
          pnpm build
          --target ${{ matrix.settings.target }}
          ${{ matrix.settings.use-cross && '--use-napi-cross' || '' }}
          ${{ matrix.settings.use-zig && '--cross-compile' || '' }}

      - name: Build WASM
        if: matrix.settings.target == 'wasm32-wasip1-threads'
        run: |
          export CFLAGS_wasm32_wasip1_threads="--sysroot=${WASI_SYSROOT}"
          pnpm run build --target wasm32-wasip1-threads

      - name: Optimize WASM with wasm-opt
        if: matrix.settings.target == 'wasm32-wasip1-threads'
        run: |
          sudo apt-get update && sudo apt-get install -y binaryen
          pnpm run optimize:wasm

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            comprs.*.node
            comprs.*.wasm
            comprs.wasi*.cjs
            comprs.wasi*.js
            wasi-worker*.mjs
          if-no-files-found: error

  # ──── Build wasm-bindgen WASM for browser usage ────
  build-wasm-bindgen:
    name: Build - wasm-bindgen
    needs: check
    if: needs.check.outputs.should_publish == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: wasm-bindgen
      - run: pnpm install --frozen-lockfile
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build wasm-bindgen
        run: pnpm run build:wasm-bindgen
      - name: Upload wasm-bindgen artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: bindings-wasm-bindgen
          path: |
            comprs-wasm.js
            comprs-wasm_bg.js
            comprs-wasm_bg.wasm
            comprs-wasm.d.ts
            comprs-wasm_bg.wasm.d.ts
          if-no-files-found: error

  # ──── Publish to npm after all builds succeed ────
  publish:
    name: Publish
    needs: [check, build, build-wasm-bindgen]
    if: needs.check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org/
      - run: pnpm install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Copy WASM wrapper files to workspace root
        run: |
          WASM_DIR="artifacts/bindings-wasm32-wasip1-threads"
          if [ -d "$WASM_DIR" ]; then
            cp "$WASM_DIR"/*.cjs "$WASM_DIR"/*.js "$WASM_DIR"/*.mjs . 2>/dev/null || true
            echo "Copied WASM wrapper files from $WASM_DIR"
            ls -la comprs.wasi* wasi-worker* 2>/dev/null
          fi

      - name: Copy wasm-bindgen files to workspace root
        run: |
          WB_DIR="artifacts/bindings-wasm-bindgen"
          if [ -d "$WB_DIR" ]; then
            cp "$WB_DIR"/comprs-wasm* . 2>/dev/null || true
            echo "Copied wasm-bindgen files from $WB_DIR"
            ls -la comprs-wasm* 2>/dev/null
          fi

      - name: Move artifacts to platform packages
        run: pnpm napi artifacts --output-dir artifacts

      - name: List packages
        run: |
          echo "=== Platform packages ==="
          for dir in npm/*/; do
            echo "$dir"
            ls -la "$dir" 2>/dev/null
            echo ""
          done

      # First publish: use granular access token (NPM_TOKEN secret).
      # After packages exist on npm, switch to OIDC trusted publishing
      # and remove NPM_TOKEN.
      - name: Publish core to npm
        run: npm publish --provenance --access public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ──── Publish middleware package independently ────
  publish-middleware:
    name: Publish Middleware
    needs: [check]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org/
      - run: pnpm install --frozen-lockfile

      - name: Check and publish middleware
        run: |
          MW_NAME=$(node -p "require('./packages/middleware/package.json').name")
          MW_VERSION=$(node -p "require('./packages/middleware/package.json').version")

          # Check publish status (distinguish E404 from other errors)
          ERR=$(npm view "${MW_NAME}@${MW_VERSION}" version 2>&1) && {
            echo "${MW_NAME}@${MW_VERSION} already published, skipping"
            exit 0
          }
          if ! echo "$ERR" | grep -q "E404"; then
            echo "Error checking ${MW_NAME}@${MW_VERSION}: $ERR"
            exit 1
          fi

          echo "Publishing ${MW_NAME}@${MW_VERSION}"
          pnpm --filter "${MW_NAME}" build
          cd packages/middleware
          npm publish --provenance --access public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ──── Merge main back into develop to prevent divergence ────
  merge-back:
    name: Merge Back
    needs: [publish, publish-middleware]
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge main into develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main --no-edit || {
            echo "Merge conflict detected — creating PR for manual resolution"
            exit 1
          }
          git push origin develop
