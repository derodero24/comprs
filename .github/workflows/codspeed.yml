name: CodSpeed

on:
  push:
    branches: [develop]
    paths:
      - "crates/**"
      - "__test__/index.bench.ts"
      - "__test__/gzip.bench.ts"
      - "__test__/deflate.bench.ts"
      - "vitest.config.mts"
      - ".github/workflows/codspeed.yml"
      - "streams.js"
      - "streams.d.ts"
      - "index.mjs"
      - "index.d.mts"
      - "node.js"
      - "node.d.ts"
  pull_request:
    branches: [develop]
    paths:
      - "crates/**"
      - "__test__/index.bench.ts"
      - "__test__/gzip.bench.ts"
      - "__test__/deflate.bench.ts"
      - "vitest.config.mts"
      - ".github/workflows/codspeed.yml"
      - "streams.js"
      - "streams.d.ts"
      - "index.mjs"
      - "index.d.mts"
      - "node.js"
      - "node.d.ts"
  workflow_dispatch:

concurrency:
  group: codspeed-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  js-benchmarks:
    name: JS Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: codspeed
      - run: pnpm install --frozen-lockfile

      - name: Build native module
        run: pnpm run build

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: walltime
          run: pnpm vitest bench __test__/index.bench.ts __test__/gzip.bench.ts __test__/deflate.bench.ts
