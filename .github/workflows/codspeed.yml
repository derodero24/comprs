name: CodSpeed

on:
  push:
    branches: [develop]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - ".github/workflows/codspeed.yml"
      - "streams.js"
      - "streams.d.ts"
      - "index.mjs"
      - "index.d.mts"
      - "node.js"
      - "node.d.ts"
  pull_request:
    branches: [develop]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - ".github/workflows/codspeed.yml"
      - "streams.js"
      - "streams.d.ts"
      - "index.mjs"
      - "index.d.mts"
      - "node.js"
      - "node.d.ts"
  workflow_dispatch:

concurrency:
  group: codspeed-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  rust-benchmarks:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: codspeed

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed

      - name: Build benchmarks
        run: cargo codspeed build -p comprs-bench

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run -p comprs-bench
