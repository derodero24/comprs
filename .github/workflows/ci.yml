name: CI

on:
  push:
    branches: [develop]
    paths:
      - 'crates/**'
      - '__test__/**'
      - 'e2e/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'tsconfig.json'
      - 'biome.json'
      - '.github/workflows/ci.yml'
      - 'deny.toml'
      - 'vitest.config.mts'
      - 'codecov.yml'
      - 'streams.js'
      - 'streams.d.ts'
      - 'index.mjs'
      - 'index.d.mts'
      - 'node.js'
      - 'node.d.ts'
      - 'scripts/**'
      - 'playwright.config.ts'
  pull_request:
    branches: [develop]
    paths:
      - 'crates/**'
      - '__test__/**'
      - 'e2e/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'tsconfig.json'
      - 'biome.json'
      - '.github/workflows/ci.yml'
      - 'deny.toml'
      - 'vitest.config.mts'
      - 'codecov.yml'
      - 'streams.js'
      - 'streams.d.ts'
      - 'index.mjs'
      - 'index.d.mts'
      - 'node.js'
      - 'node.d.ts'
      - 'scripts/**'
      - 'playwright.config.ts'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - run: pnpm run build
      - name: Verify generated binding files are up to date
        run: git diff --exit-code index.js index.d.ts browser.js
      - run: pnpm run typecheck
      - run: pnpm run publint
      - name: Validate TypeScript type resolution
        run: pnpm run attw

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit npm dependencies
        run: pnpm audit --prod
      - name: Audit Rust dependencies
        uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2
      - name: Install cargo-audit
        uses: taiki-e/install-action@06203676c62f0d3c765be3f2fcfbebbcb02d09f5 # v2
        with:
          tool: cargo-audit
      - name: Run cargo audit
        run: cargo audit
      - name: Install cargo-shear
        uses: taiki-e/install-action@06203676c62f0d3c765be3f2fcfbebbcb02d09f5 # v2
        with:
          tool: cargo-shear
      - name: Detect unused dependencies
        run: cargo shear

  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt -- --check
      - run: cargo clippy -- -W clippy::all

  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test

  build:
    name: Build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
          - host: ubuntu-latest
            target: wasm32-wasip1-threads

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: build-${{ matrix.settings.target }}
      - run: pnpm install --frozen-lockfile

      # Linux cross-compilation setup
      - name: Install cross-compilation tools (aarch64-gnu)
        if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install cross-compilation tools (x86_64-musl)
        if: matrix.settings.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (aarch64-musl)
        if: matrix.settings.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build native
        if: matrix.settings.target != 'wasm32-wasip1-threads'
        run: pnpm run build --target ${{ matrix.settings.target }}

      - name: Setup WASI SDK
        if: matrix.settings.target == 'wasm32-wasip1-threads'
        run: |
          WASI_SDK_VERSION="25"
          WASI_SDK_DIR="wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux"
          curl -fsSL "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/${WASI_SDK_DIR}.tar.gz" | tar xz -C "${RUNNER_TEMP}"
          echo "WASI_SDK_PATH=${RUNNER_TEMP}/${WASI_SDK_DIR}" >> $GITHUB_ENV
          echo "WASI_SYSROOT=${RUNNER_TEMP}/${WASI_SDK_DIR}/share/wasi-sysroot" >> $GITHUB_ENV
          echo "CC_wasm32_wasip1_threads=${RUNNER_TEMP}/${WASI_SDK_DIR}/bin/clang" >> $GITHUB_ENV
          echo "AR_wasm32_wasip1_threads=${RUNNER_TEMP}/${WASI_SDK_DIR}/bin/llvm-ar" >> $GITHUB_ENV

      - name: Build WASM
        if: matrix.settings.target == 'wasm32-wasip1-threads'
        run: |
          export CFLAGS_wasm32_wasip1_threads="--sysroot=${WASI_SYSROOT}"
          pnpm run build --target wasm32-wasip1-threads

      - name: Optimize WASM with wasm-opt
        if: matrix.settings.target == 'wasm32-wasip1-threads'
        run: |
          sudo apt-get update && sudo apt-get install -y binaryen
          pnpm run optimize:wasm

      - name: Report WASM binary size
        if: matrix.settings.target == 'wasm32-wasip1-threads'
        run: |
          WASM_FILE=$(ls zflate.*.wasm 2>/dev/null | head -1)
          if [ -n "$WASM_FILE" ]; then
            SIZE=$(stat -c%s "$WASM_FILE" 2>/dev/null || stat -f%z "$WASM_FILE")
            SIZE_KB=$(( SIZE / 1024 ))
            echo "### WASM Binary Size" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            echo "| $WASM_FILE | ${SIZE_KB} KB |" >> $GITHUB_STEP_SUMMARY
            mkdir -p wasm-size-report
            echo "$WASM_FILE" > wasm-size-report/file.txt
            echo "$SIZE_KB" > wasm-size-report/size.txt
          fi

      - name: Upload WASM size report
        if: matrix.settings.target == 'wasm32-wasip1-threads'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: wasm-size-report
          path: wasm-size-report/
          if-no-files-found: ignore

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            *.node
            index.js
            index.d.ts
          if-no-files-found: ignore

      - name: Upload WASM artifact
        if: matrix.settings.target == 'wasm32-wasip1-threads'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: bindings-wasm32
          path: |
            *.wasm
            *.wasi.cjs
            *.wasi-browser.js
            wasi-worker.mjs
            wasi-worker-browser.mjs
          if-no-files-found: ignore

  test:
    name: Test - Node ${{ matrix.node }} / ${{ matrix.os }}
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact: bindings-x86_64-unknown-linux-gnu
          - os: macos-latest
            artifact: bindings-aarch64-apple-darwin
          - os: windows-latest
            artifact: bindings-x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ matrix.artifact }}
          path: .
      - run: pnpm test
      - name: ESM import smoke test
        run: node __test__/esm-import.mjs

  test-wasm:
    name: WASM Test (Node.js)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download native artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: .
      - name: Download WASM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: bindings-wasm32
          path: .
      - name: Run WASM tests
        run: pnpm run test:wasm

  test-browser:
    name: Browser WASM Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download WASM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: bindings-wasm32
          path: .
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run browser tests
        run: pnpm run test:browser

  test-deno:
    name: Deno WASM Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2
        with:
          deno-version: v2.x
      - run: pnpm install --frozen-lockfile
      - name: Download WASM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: bindings-wasm32
          path: .
      - name: Run Deno WASM tests
        run: pnpm run test:deno

  test-bun:
    name: Bun WASM Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: pnpm install --frozen-lockfile
      - name: Download WASM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: bindings-wasm32
          path: .
      - name: Run Bun WASM tests
        run: pnpm run test:bun

  coverage:
    name: Coverage
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Rust coverage
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@06203676c62f0d3c765be3f2fcfbebbcb02d09f5 # v2
        with:
          tool: cargo-llvm-cov
      - name: Rust coverage
        run: cargo llvm-cov --lcov --output-path rust-lcov.info

      # JS coverage
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download x86_64 linux artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: .
      - name: JS coverage
        run: pnpm test -- --coverage

      # Upload to Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          files: rust-lcov.info,coverage/lcov.info
          flags: rust,javascript
          fail_ci_if_error: false

  report-wasm-size:
    name: Report WASM Size
    if: github.event_name == 'pull_request'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Download WASM size report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: wasm-size-report
          path: wasm-size-report
      - name: Read size data
        id: read
        run: |
          echo "file=$(cat wasm-size-report/file.txt)" >> $GITHUB_OUTPUT
          echo "size=$(cat wasm-size-report/size.txt)" >> $GITHUB_OUTPUT
      - name: Post size comment on PR
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### WASM Binary Size

            | File | Size |
            |------|------|
            | ${{ steps.read.outputs.file }} | ${{ steps.read.outputs.size }} KB |
          comment-tag: wasm-size-report

  # ──── Aggregate gate: single required status check ────
  ci-complete:
    name: CI Complete
    if: always()
    needs: [lint, audit, rust-lint, rust-test, test, test-wasm, test-browser, test-deno, test-bun, coverage]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
